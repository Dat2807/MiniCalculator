<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Mini Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 24px 28px;
            box-shadow:
                0 10px 30px rgba(15, 23, 42, 0.7),
                0 0 0 1px rgba(148, 163, 184, 0.15);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 12px;
            text-align: center;
        }

        p.subtitle {
            margin: 0 0 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        form {
            display: grid;
            gap: 12px;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: block;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background-color: #020617;
            color: #e5e7eb;
            font-size: 0.95rem;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.5);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            margin-top: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }

        button:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.55);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        .result,
        .error {
            margin-top: 16px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .result {
            background-color: rgba(22, 163, 74, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #bbf7d0;
        }

        .error {
            background-color: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.6);
            color: #fecaca;
        }

        .footer {
            margin-top: 16px;
            font-size: 0.75rem;
            text-align: center;
            color: #6b7280;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Mini Calculator</h1>
    <p class="subtitle">Dự án demo CI/CD với Django</p>

    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div>
                <label for="id_a">First number</label>
                <input
                    id="id_a"
                    name="a"
                    type="number"
                    step="any"
                    value="{{ a }}"
                    required
                />
            </div>
            <div>
                <label for="id_b">Second number</label>
                <input
                    id="id_b"
                    name="b"
                    type="number"
                    step="any"
                    value="{{ b }}"
                    required
                />
            </div>
        </div>

        <div>
            <label for="id_op">Operation</label>
            <select id="id_op" name="op">
                <option value="add" {% if op == "add" %}selected{% endif %}>Add (+)</option>
                <option value="sub" {% if op == "sub" %}selected{% endif %}>Subtract (−)</option>
                <option value="mul" {% if op == "mul" %}selected{% endif %}>Multiply (×)</option>
                <option value="div" {% if op == "div" %}selected{% endif %}>Divide (÷)</option>
            </select>
        </div>

        <button type="submit">Calculate</button>
    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% elif result is not None %}
        <div class="result">
            Result: <strong>{{ result }}</strong>
        </div>
    {% endif %}

    <div class="footer">
        Mini Calculator &mdash; CI/CD demo
    </div>
</main>
</body>
</html>
